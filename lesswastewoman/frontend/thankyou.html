<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dziękujemy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="checkout-page">
    <h1>🌸 Dziękujemy za zamówienie!</h1>

    <div id="order-summary"></div>

    <a href="index.html">
        <button>Wróć do sklepu</button>
    </a>
</div>

<script>
const order = JSON.parse(localStorage.getItem("lastOrder"));

const summary = document.getElementById("order-summary");

if (order) {
    let totalBrutto = order.totalBrutto || 0;
    let net = totalBrutto / 1.23;
    let vat = totalBrutto - net;

    summary.innerHTML = `
        <p><strong>Imię:</strong> ${order.name}</p>
        <p><strong>Email:</strong> ${order.email}</p>
        <p><strong>Dostawa:</strong> ${order.delivery}</p>
        ${
            order.delivery === "paczkomat"
            ? `<p><strong>Paczkomat:</strong> ${order.paczkomat}</p>`
            : `<p><strong>Adres:</strong> ${order.address}</p>`
        }
        <hr>
        <h3>Produkty:</h3>
        ${order.cart.map(item => `<p>${item.name} x${item.quantity} (${item.price.toFixed(2)} zł)</p>`).join("")}
        <hr>
        <p><strong>Netto:</strong> ${net.toFixed(2)} zł</p>
        <p><strong>VAT (23%):</strong> ${vat.toFixed(2)} zł</p>
        <h3><strong>Razem (brutto):</strong> ${totalBrutto.toFixed(2)} zł</h3>
    `;
}
</script>

</body>
</html>
