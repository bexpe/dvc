<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">

<!-- Leaflet CSS i JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div class="checkout-page">
<h1>Finalizacja zamówienia 💳</h1>

<form id="order-form">
    <input type="text" id="name" placeholder="Imię i nazwisko" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="address" placeholder="Adres dostawy">

    <label style="margin-top:15px; display:block;">Metoda dostawy:</label>
    <select id="delivery" onchange="togglePaczkomat()" required>
        <option value="">Wybierz dostawę</option>
        <option value="kurier">Kurier</option>
        <option value="paczkomat">Paczkomat</option>
    </select>

    <!-- Rozwijana lista paczkomatów -->
    <select id="paczkomat" style="display:none; margin-top:10px;" required>
        <option value="">Wybierz paczkomat</option>
        <option value="WAW01A">WAW01A – Warszawa, Marszałkowska</option>
        <option value="KRK02B">KRK02B – Kraków, Floriańska</option>
        <option value="GDA03C">GDA03C – Gdańsk, Długa</option>
        <option value="POZ04D">POZ04D – Poznań, Święty Marcin</option>
        <option value="WRO05E">WRO05E – Wrocław, Świdnicka</option>
    </select>

    <!-- Kontener mapy -->
    <div id="leaflet-map" style="height:300px; margin-top:15px;"></div>

    <button type="submit" style="margin-top:15px;">Złóż zamówienie</button>
</form>
</div>

<script>
function togglePaczkomat() {
    const delivery = document.getElementById("delivery").value;
    const paczkomatSelect = document.getElementById("paczkomat");
    const addressInput = document.getElementById("address");

    if(delivery==="paczkomat") {
        paczkomatSelect.style.display="block";
        paczkomatSelect.required=true;
        addressInput.required=false;
    } else {
        paczkomatSelect.style.display="none";
        paczkomatSelect.required=false;
        addressInput.required=true;
    }
}

// Formularz zamówienia
document.getElementById("order-form").addEventListener("submit", function(e){
    e.preventDefault();
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    if(cart.length===0){ alert("Koszyk pusty!"); return; }

    const totalBrutto = cart.reduce((sum,item)=>sum+item.price*item.quantity,0);

    const orderData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value,
        delivery: document.getElementById("delivery").value,
        paczkomat: document.getElementById("paczkomat").value,
        cart: cart,
        totalBrutto: totalBrutto
    };

    localStorage.setItem("lastOrder", JSON.stringify(orderData));
    localStorage.removeItem("cart");

    window.location.href="thankyou.html";
});

// Leaflet map
document.addEventListener("DOMContentLoaded", function() {
    const map = L.map("leaflet-map").setView([52.2297, 21.0122], 6);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    const paczkomaty = [
        { code: "WAW01A", coords: [52.2297, 21.0122], label: "Warszawa, Marszałkowska" },
        { code: "KRK02B", coords: [50.0614, 19.9372], label: "Kraków, Floriańska" },
        { code: "GDA03C", coords: [54.3520, 18.6466], label: "Gdańsk, Długa" },
        { code: "POZ04D", coords: [52.4064, 16.9252], label: "Poznań, Święty Marcin" },
        { code: "WRO05E", coords: [51.1079, 17.0385], label: "Wrocław, Świdnicka" }
    ];

    paczkomaty.forEach(p => {
        const marker = L.marker(p.coords).addTo(map);
        marker.bindPopup(`${p.code} – ${p.label}`);
        marker.on("click", () => {
            document.getElementById("paczkomat").value = p.code;
        });
    });
});
</script>

</body>
</html>
